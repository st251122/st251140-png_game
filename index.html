<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SMASH - スタイリッシュ対戦アクション</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510; /* 深いダークブルー */
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
        }

        #game-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ネオンエフェクト用のテキストスタイル */
        .neon-text-p1 {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff;
        }
        .neon-text-p2 {
            color: #ff00ff;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        /* グラスモーフィズムパネル */
        .glass-panel {
            background: rgba(10, 10, 25, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .stock-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>

    <!-- ゲーム描画用キャンバス -->
    <canvas id="game-canvas"></canvas>

    <!-- UIレイヤー -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 sm:p-10 z-10 hidden">
        <!-- 上部：ストック（残機）表示 -->
        <div class="flex justify-between w-full">
            <div id="p1-stocks" class="flex gap-3 text-[#00ffff]">
                <!-- JSで生成 -->
            </div>
            <div id="p2-stocks" class="flex gap-3 text-[#ff00ff]">
                <!-- JSで生成 -->
            </div>
        </div>

        <!-- 下部：ダメージ（％）表示 -->
        <div class="flex justify-between w-full items-end pb-4">
            <div class="flex flex-col items-start">
                <span class="text-sm text-gray-400 font-bold mb-1">PLAYER 1</span>
                <div class="text-6xl sm:text-8xl font-black neon-text-p1"><span id="p1-damage">0</span><span class="text-3xl sm:text-5xl">%</span></div>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-sm text-gray-400 font-bold mb-1">PLAYER 2</span>
                <div class="text-6xl sm:text-8xl font-black neon-text-p2"><span id="p2-damage">0</span><span class="text-3xl sm:text-5xl">%</span></div>
            </div>
        </div>
    </div>

    <!-- スタート画面 -->
    <div id="start-screen" class="absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-sm z-50 transition-opacity duration-300">
        <div class="glass-panel p-8 sm:p-12 rounded-2xl max-w-2xl w-full mx-4 text-center">
            <h1 class="text-5xl sm:text-7xl font-black mb-2 tracking-widest italic" style="color: #fff; text-shadow: 2px 2px 0 #00ffff, -2px -2px 0 #ff00ff;">NEON SMASH</h1>
            <p class="text-gray-400 mb-8 tracking-widest text-sm">LOCAL MULTIPLAYER BRAWLER</p>
            
            <div class="flex flex-col sm:flex-row gap-6 mb-10 text-left">
                <!-- 1P 操作 -->
                <div class="flex-1 bg-white/5 p-4 rounded-xl border border-[#00ffff]/30">
                    <h2 class="neon-text-p1 font-bold text-xl mb-4 text-center">PLAYER 1 (Cyan)</h2>
                    <ul class="space-y-2 text-sm text-gray-300">
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">A</kbd> <kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">D</kbd> : 左右移動</li>
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">W</kbd> : ジャンプ (空中でもう1回可)</li>
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">S</kbd> : すり抜け床を降りる</li>
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">F</kbd> : 攻撃 (スマッシュ)</li>
                    </ul>
                </div>
                <!-- 2P 操作 -->
                <div class="flex-1 bg-white/5 p-4 rounded-xl border border-[#ff00ff]/30">
                    <h2 class="neon-text-p2 font-bold text-xl mb-4 text-center">PLAYER 2 (Magenta)</h2>
                    <ul class="space-y-2 text-sm text-gray-300">
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">←</kbd> <kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">→</kbd> : 左右移動</li>
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">↑</kbd> : ジャンプ (空中でもう1回可)</li>
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">↓</kbd> : すり抜け床を降りる</li>
                        <li><kbd class="bg-white/20 px-2 py-1 rounded text-white font-mono">L</kbd> : 攻撃 (スマッシュ)</li>
                    </ul>
                </div>
            </div>

            <p class="text-lg text-white mb-6">ダメージ(%)を溜めて、相手を画面外へ吹っ飛ばせ！</p>
            <button id="start-btn" class="bg-white text-black font-bold text-xl px-10 py-3 rounded-full hover:scale-105 transition-transform hover:shadow-[0_0_20px_rgba(255,255,255,0.5)] cursor-pointer pointer-events-auto">
                BATTLE START
            </button>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="absolute inset-0 flex items-center justify-center bg-black/90 backdrop-blur-md z-50 hidden opacity-0 transition-opacity duration-500">
        <div class="text-center">
            <h1 id="winner-text" class="text-6xl sm:text-8xl font-black mb-8 tracking-widest italic uppercase"></h1>
            <button id="restart-btn" class="glass-panel text-white font-bold text-xl px-8 py-3 rounded-full hover:bg-white/20 transition-colors cursor-pointer pointer-events-auto">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // UI要素
        const uiLayer = document.getElementById('ui-layer');
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const p1DamageEl = document.getElementById('p1-damage');
        const p2DamageEl = document.getElementById('p2-damage');
        const p1StocksEl = document.getElementById('p1-stocks');
        const p2StocksEl = document.getElementById('p2-stocks');
        const winnerText = document.getElementById('winner-text');

        // キャンバスのサイズを画面に合わせる（固定アスペクト比 16:9 で計算用座標系を作る）
        const GAME_WIDTH = 1280;
        const GAME_HEIGHT = 720;
        let scale = 1;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // 画面に収まるようにスケールを計算
            scale = Math.min(canvas.width / GAME_WIDTH, canvas.height / GAME_HEIGHT);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- キーボード入力の管理 ---
        const keys = {};
        const prevKeys = {}; // 前フレームのキー状態（押した瞬間を検知するため）

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // スクロール防止
            if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- ゲーム定数 ---
        const GRAVITY = 0.6;
        const MAX_FALL_SPEED = 15;
        const MOVE_SPEED = 6;
        const JUMP_FORCE = 13;
        const FRICTION = 0.8; // 地上での滑りにくさ
        const AIR_FRICTION = 0.95; // 空中での抵抗

        const HITSTUN_MULTIPLIER = 1.5; // ダメージによる硬直時間の倍率
        const KNOCKBACK_BASE = 5;       // 基礎吹っ飛び力
        const KNOCKBACK_MULTIPLIER = 0.15; // ダメージ％による吹っ飛び増加量

        // --- ステージ（足場） ---
        const platforms = [
            // メインステージ (中央下)
            { x: 340, y: 550, width: 600, height: 40, type: 'solid' },
            // 左プラットフォーム (すり抜け可能)
            { x: 200, y: 380, width: 250, height: 15, type: 'pass-through' },
            // 右プラットフォーム (すり抜け可能)
            { x: 830, y: 380, width: 250, height: 15, type: 'pass-through' },
            // 中央上プラットフォーム (すり抜け可能)
            { x: 540, y: 220, width: 200, height: 15, type: 'pass-through' }
        ];

        // --- パーティクルシステム（ヒット時のエフェクト用） ---
        let particles = [];
        class Particle {
            constructor(x, y, color, vx, vy, life) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += GRAVITY * 0.5;
                this.life--;
            }
            draw(ctx) {
                const alpha = Math.max(0, this.life / this.maxLife);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color, amount) {
            for (let i = 0; i < amount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 5;
                particles.push(new Particle(
                    x, y, color, 
                    Math.cos(angle) * speed, 
                    Math.sin(angle) * speed, 
                    Math.random() * 20 + 10
                ));
            }
        }

        // --- プレイヤークラス ---
        class Player {
            constructor(id, x, y, color, controls) {
                this.id = id;
                // 基本プロパティ
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 60;
                this.color = color;
                
                // 物理
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.facing = id === 1 ? 1 : -1; // 1:右, -1:左
                
                // ステータス
                this.damage = 0;
                this.stocks = 3;
                this.maxJumps = 2;
                this.jumpCount = 0;
                
                // 状態異常・アクションタイマー
                this.hitstun = 0;      // ダメージを受けて操作不能なフレーム数
                this.invincible = 0;   // 無敵フレーム（リスポーン時など）
                this.isAttacking = false;
                this.attackDuration = 15; // 攻撃の持続フレーム
                this.attackTimer = 0;
                this.attackCooldown = 0;  // 連続攻撃防止
                
                // 入力マッピング
                this.controls = controls;

                // 描画用のトレース（軌跡）
                this.trail = [];
            }

            respawn() {
                this.x = this.id === 1 ? 400 : 880;
                this.y = 100;
                this.vx = 0;
                this.vy = 0;
                this.damage = 0;
                this.invincible = 120; // 2秒無敵 (60fps想定)
                this.hitstun = 0;
                this.jumpCount = 0;
                
                // UI更新
                updateUI();
            }

            takeDamage(damage, knockbackX, knockbackY) {
                this.damage += damage;
                
                // スマブラ風：ダメージが蓄積するほど吹っ飛びが大きくなる
                const multiplier = 1 + (this.damage * KNOCKBACK_MULTIPLIER);
                
                this.vx = knockbackX * KNOCKBACK_BASE * multiplier;
                this.vy = knockbackY * KNOCKBACK_BASE * multiplier;
                
                // 硬直時間の計算（吹っ飛び速度に比例）
                this.hitstun = Math.floor(Math.sqrt(this.vx**2 + this.vy**2) * HITSTUN_MULTIPLIER);
                
                // エフェクト発生
                createExplosion(this.x + this.width/2, this.y + this.height/2, this.color, Math.floor(multiplier * 5));
                
                updateUI();
            }

            update(otherPlayer) {
                // 軌跡の保存
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 5) this.trail.shift();

                // タイマーの更新
                if (this.invincible > 0) this.invincible--;
                if (this.attackCooldown > 0) this.attackCooldown--;

                // --- 状態の判定 ---
                if (this.hitstun > 0) {
                    // 操作不能（吹っ飛び中）
                    this.hitstun--;
                    // 空中抵抗を少し減らしてよく飛ぶようにする
                    this.vx *= 0.98;
                } else {
                    // --- 入力処理（通常時） ---
                    
                    // 左右移動
                    if (keys[this.controls.left]) {
                        this.vx -= 1.5;
                        this.facing = -1;
                    } else if (keys[this.controls.right]) {
                        this.vx += 1.5;
                        this.facing = 1;
                    }

                    // 摩擦の適用（入力がない時や逆向きの時）
                    if (this.onGround) {
                        this.vx *= FRICTION;
                    } else {
                        this.vx *= AIR_FRICTION;
                    }

                    // 速度制限 (自力移動の最大速度)
                    // ※ただし、ノックバックで吹っ飛んでいる時は制限しない
                    if (Math.abs(this.vx) > MOVE_SPEED && this.hitstun <= 0) {
                        this.vx = Math.sign(this.vx) * MOVE_SPEED;
                    }

                    // ジャンプ (押した瞬間のみ)
                    if (keys[this.controls.jump] && !prevKeys[this.controls.jump]) {
                        if (this.jumpCount < this.maxJumps) {
                            this.vy = -JUMP_FORCE;
                            this.jumpCount++;
                            this.onGround = false;
                        }
                    }

                    // 攻撃 (地上・空中共通のスマッシュ攻撃)
                    if (keys[this.controls.attack] && !prevKeys[this.controls.attack] && this.attackCooldown <= 0 && !this.isAttacking) {
                        this.isAttacking = true;
                        this.attackTimer = this.attackDuration;
                        this.attackCooldown = 30; // 攻撃後の隙
                    }
                }

                // --- 攻撃の処理と当たり判定 ---
                if (this.isAttacking) {
                    this.attackTimer--;
                    
                    // 攻撃のヒットボックス (向いている方向の前方に出現)
                    const hitBox = {
                        x: this.facing === 1 ? this.x + this.width : this.x - 60,
                        y: this.y + 10,
                        width: 60,
                        height: 40
                    };

                    // 相手への当たり判定 (無敵じゃない時)
                    if (this.attackTimer > this.attackDuration - 5) { // 発生の数フレームだけ判定を出す
                        if (otherPlayer.invincible <= 0 &&
                            hitBox.x < otherPlayer.x + otherPlayer.width &&
                            hitBox.x + hitBox.width > otherPlayer.x &&
                            hitBox.y < otherPlayer.y + otherPlayer.height &&
                            hitBox.y + hitBox.height > otherPlayer.y) {
                            
                            // ヒット！
                            // ベクトル計算：相手を斜め上に吹き飛ばす
                            const dirX = this.facing;
                            const dirY = -0.8; 
                            
                            otherPlayer.takeDamage(12, dirX, dirY);
                            
                            // 攻撃を当てた側はヒットストップ（少し硬直）を入れて重さを出す
                            this.vx = 0;
                            this.vy = 0;
                        }
                    }

                    if (this.attackTimer <= 0) {
                        this.isAttacking = false;
                    }
                }

                // --- 物理演算 ---
                this.vy += GRAVITY;
                if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

                // 次の位置
                let nextX = this.x + this.vx;
                let nextY = this.y + this.vy;

                this.onGround = false;

                // --- 地形との衝突判定 ---
                // 下方向のすり抜け入力（Sキーなど）
                const droppingDown = keys[this.controls.down];

                for (const plat of platforms) {
                    // 足場の上面との衝突のみ判定（下から上へはすり抜ける）
                    // 前フレームでは足場より上にいて、次フレームで足場にめり込む場合
                    if (this.vy > 0 && 
                        this.y + this.height <= plat.y && 
                        nextY + this.height >= plat.y &&
                        nextX + this.width > plat.x && 
                        nextX < plat.x + plat.width) {
                        
                        // すり抜け床で下キーを押している場合は無視
                        if (plat.type === 'pass-through' && droppingDown) {
                            continue;
                        }

                        // 着地
                        nextY = plat.y - this.height;
                        this.vy = 0;
                        this.onGround = true;
                        this.jumpCount = 0; // ジャンプ回数リセット
                    }
                }

                this.x = nextX;
                this.y = nextY;

                // --- 場外（バースト）判定 ---
                // 画面外の余裕（Blast zone）
                const margin = 100;
                if (this.x < -margin || this.x > GAME_WIDTH + margin || 
                    this.y > GAME_HEIGHT + margin || this.y < -margin * 2) {
                    
                    // バーストエフェクト
                    createExplosion(Math.max(0, Math.min(this.x, GAME_WIDTH)), Math.max(0, Math.min(this.y, GAME_HEIGHT)), this.color, 50);

                    this.stocks--;
                    if (this.stocks > 0) {
                        this.respawn();
                    } else {
                        // ゲームオーバー処理
                        this.y = 9999; // 画面外に隠す
                        this.vx = 0;
                        this.vy = 0;
                        endGame(otherPlayer.id);
                    }
                }
            }

            draw(ctx) {
                // 残機0の場合は描画しない
                if (this.stocks <= 0) return;

                // 点滅処理 (無敵時間)
                if (this.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
                    return; // 描画スキップ
                }

                // 軌跡（残像）の描画
                if (Math.abs(this.vx) > 5 || Math.abs(this.vy) > 5) {
                    this.trail.forEach((pos, index) => {
                        ctx.fillStyle = this.color;
                        ctx.globalAlpha = (index / this.trail.length) * 0.3;
                        ctx.fillRect(pos.x, pos.y, this.width, this.height);
                    });
                    ctx.globalAlpha = 1.0;
                }

                // 本体描画 (ネオン風)
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = '#111'; // 中身は暗め
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;

                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 5);
                ctx.fill();
                ctx.stroke();
                
                // 目の描画（向きを示す）
                ctx.shadowBlur = 0;
                ctx.fillStyle = this.color;
                const eyeX = this.facing === 1 ? this.x + 25 : this.x + 5;
                ctx.fillRect(eyeX, this.y + 10, 10, 10);

                // 攻撃のエフェクト描画
                if (this.isAttacking) {
                    const hitBox = {
                        x: this.facing === 1 ? this.x + this.width : this.x - 60,
                        y: this.y + 10,
                        width: 60,
                        height: 40
                    };
                    
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#fff';
                    // 攻撃の軌跡のような形
                    ctx.beginPath();
                    if (this.facing === 1) {
                        ctx.moveTo(this.x + this.width, this.y + 30);
                        ctx.lineTo(hitBox.x + hitBox.width, hitBox.y);
                        ctx.lineTo(hitBox.x + hitBox.width, hitBox.y + hitBox.height);
                    } else {
                        ctx.moveTo(this.x, this.y + 30);
                        ctx.lineTo(hitBox.x, hitBox.y);
                        ctx.lineTo(hitBox.x, hitBox.y + hitBox.height);
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // ダメージ受けてる時の赤いオーバーレイ
                if (this.hitstun > 0) {
                    ctx.fillStyle = `rgba(255, 0, 0, ${Math.min(0.8, this.hitstun / 20)})`;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }
        }

        // --- ゲーム管理 ---
        let player1, player2;
        let gameActive = false;
        let animationId;

        function initGame() {
            // P1: WASD + F
            player1 = new Player(1, 400, 100, '#00ffff', {
                left: 'KeyA', right: 'KeyD', jump: 'KeyW', down: 'KeyS', attack: 'KeyF'
            });
            // P2: 矢印 + L
            player2 = new Player(2, 880, 100, '#ff00ff', {
                left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', down: 'ArrowDown', attack: 'KeyL'
            });

            particles = [];
            gameActive = true;
            updateUI();
            
            // 状態リセット
            Object.keys(keys).forEach(k => keys[k] = false);
            Object.keys(prevKeys).forEach(k => prevKeys[k] = false);

            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function updateUI() {
            p1DamageEl.innerText = Math.floor(player1.damage);
            p2DamageEl.innerText = Math.floor(player2.damage);

            // ストックアイコンの描画
            p1StocksEl.innerHTML = '';
            for(let i=0; i<player1.stocks; i++) {
                p1StocksEl.innerHTML += `<div class="stock-icon bg-[#00ffff]"></div>`;
            }
            p2StocksEl.innerHTML = '';
            for(let i=0; i<player2.stocks; i++) {
                p2StocksEl.innerHTML += `<div class="stock-icon bg-[#ff00ff]"></div>`;
            }
        }

        function endGame(winnerId) {
            gameActive = false;
            uiLayer.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            // 描画更新を待ってからフェードイン
            setTimeout(() => {
                resultScreen.classList.remove('opacity-0');
            }, 50);

            winnerText.innerText = `PLAYER ${winnerId} WINS!`;
            winnerText.className = `text-6xl sm:text-8xl font-black mb-8 tracking-widest italic uppercase ${winnerId === 1 ? 'neon-text-p1' : 'neon-text-p2'}`;
        }

        // --- 描画と更新のループ ---
        function drawBackground() {
            // 背景クリア
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // サイバーパンク風グリッド
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            
            // 少しスクロールさせる演出（オプション）
            const offset = (Date.now() / 50) % gridSize;

            ctx.beginPath();
            for (let x = 0; x < GAME_WIDTH; x += gridSize) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_HEIGHT);
            }
            for (let y = 0; y < GAME_HEIGHT; y += gridSize) {
                ctx.moveTo(0, y + offset);
                ctx.lineTo(GAME_WIDTH, y + offset);
            }
            ctx.stroke();
        }

        function drawPlatforms() {
            platforms.forEach(plat => {
                // ネオンエフェクト
                ctx.shadowBlur = 10;
                ctx.shadowColor = plat.type === 'solid' ? '#fff' : '#0ff';
                
                // ベースの色
                ctx.fillStyle = plat.type === 'solid' ? '#222' : 'rgba(0, 50, 50, 0.5)';
                ctx.strokeStyle = plat.type === 'solid' ? '#fff' : '#0ff';
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.roundRect(plat.x, plat.y, plat.width, plat.height, 4);
                ctx.fill();
                ctx.stroke();

                // 上部のハイライトライン
                ctx.fillStyle = plat.type === 'solid' ? '#fff' : '#0ff';
                ctx.fillRect(plat.x + 2, plat.y, plat.width - 4, 4);
                
                ctx.shadowBlur = 0; // リセット
            });
        }

        function gameLoop() {
            if (!gameActive) return;

            // --- 更新 ---
            player1.update(player2);
            player2.update(player1);

            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);

            // prevKeys の更新
            Object.assign(prevKeys, keys);

            // --- 描画 ---
            // キャンバス全体を画面サイズに合わせつつ、内部の座標系はGAME_WIDTH/HEIGHTに固定
            ctx.save();
            // 画面中央に配置
            ctx.translate((canvas.width - GAME_WIDTH * scale) / 2, (canvas.height - GAME_HEIGHT * scale) / 2);
            ctx.scale(scale, scale);

            drawBackground();
            drawPlatforms();
            
            particles.forEach(p => p.draw(ctx));

            player1.draw(ctx);
            player2.draw(ctx);

            ctx.restore();

            animationId = requestAnimationFrame(gameLoop);
        }

        // --- イベントリスナー ---
        startBtn.addEventListener('click', () => {
            startScreen.classList.add('opacity-0');
            setTimeout(() => {
                startScreen.classList.add('hidden');
                uiLayer.classList.remove('hidden');
                initGame();
            }, 300);
        });

        restartBtn.addEventListener('click', () => {
            resultScreen.classList.add('opacity-0');
            setTimeout(() => {
                resultScreen.classList.add('hidden');
                uiLayer.classList.remove('hidden');
                initGame();
            }, 500);
        });

        // 最初の描画だけしておく（スタート画面の背景用）
        drawBackground();
        drawPlatforms();

    </script>
</body>
</html>
